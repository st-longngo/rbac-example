services:
  postgres:
    image: postgres:16-alpine
    container_name: rbac_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: rbac_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rbac_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
